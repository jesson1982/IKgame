<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="artemisBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9B59B6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E74C3C;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <circle cx="100" cy="100" r="95" fill="url(#artemisBg)" stroke="#FFF" stroke-width="4"/>
  
  <!-- Bow Symbol -->
  <path d="M70 80 Q90 100 70 120" fill="none" stroke="#000" stroke-width="4" opacity="0.7"/>
  <line x1="70" y1="80" x2="70" y2="120" stroke="#000" stroke-width="2" opacity="0.7"/>
  
  <!-- Arrow -->
  <line x1="85" y1="100" x2="130" y2="100" stroke="#000" stroke-width="3" opacity="0.6"/>
  <polygon points="130,100 122,96 122,104" fill="#000" opacity="0.6"/>
  
  <!-- Letter A -->
  <text x="110" y="105" font-family="Arial Black, sans-serif" font-size="50" 
        font-weight="bold" fill="#FFF" text-anchor="middle" dominant-baseline="middle">A</text>
  
  <!-- Epic Border Effect -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#FFF" stroke-width="2" 
          stroke-dasharray="8,4" opacity="0.5"/>
</svg>
