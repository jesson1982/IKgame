<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="leonidasBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9B59B6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8E44AD;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <circle cx="100" cy="100" r="95" fill="url(#leonidasBg)" stroke="#FFF" stroke-width="4"/>
  
  <!-- Spartan Helmet -->
  <path d="M75 70 Q100 55 125 70 L125 90 Q100 80 75 90 Z" 
        fill="#000" opacity="0.8"/>
  <line x1="100" y1="55" x2="100" y2="70" stroke="#FFD700" stroke-width="3"/>
  
  <!-- Spear Symbol -->
  <line x1="100" y1="95" x2="100" y2="155" stroke="#000" stroke-width="3" opacity="0.6"/>
  <polygon points="100,90 95,100 105,100" fill="#000" opacity="0.6"/>
  
  <!-- Letter L -->
  <text x="100" y="130" font-family="Arial Black, sans-serif" font-size="60" 
        font-weight="bold" fill="#FFF" text-anchor="middle" dominant-baseline="middle">L</text>
  
  <!-- Epic Border Effect -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#FFF" stroke-width="2" 
          stroke-dasharray="8,4" opacity="0.5"/>
</svg>
