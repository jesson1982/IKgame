<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="lunaBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3498DB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9B59B6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <circle cx="100" cy="100" r="95" fill="url(#lunaBg)" stroke="#FFF" stroke-width="4"/>
  
  <!-- Moon Symbol -->
  <path d="M85 70 Q100 65 100 80 Q100 95 85 90 Q90 85 90 80 Q90 75 85 70" 
        fill="#FFD700" opacity="0.8"/>
  
  <!-- Magic Staff -->
  <line x1="100" y1="95" x2="100" y2="150" stroke="#FFF" stroke-width="3" opacity="0.7"/>
  <circle cx="100" cy="90" r="8" fill="#FFD700" opacity="0.8"/>
  <circle cx="100" cy="90" r="4" fill="#FFF"/>
  
  <!-- Letter L -->
  <text x="100" y="130" font-family="Arial Black, sans-serif" font-size="55" 
        font-weight="bold" fill="#FFF" text-anchor="middle" dominant-baseline="middle">L</text>
  
  <!-- Rare Border Effect -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#FFF" stroke-width="2" 
          stroke-dasharray="6,3" opacity="0.5"/>
</svg>
