<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="cleopatraBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF69B4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <circle cx="100" cy="100" r="95" fill="url(#cleopatraBg)" stroke="#FFF" stroke-width="4"/>
  
  <!-- Egyptian Headdress -->
  <path d="M70 70 Q100 50 130 70 L130 85 Q100 75 70 85 Z" 
        fill="#000" opacity="0.8"/>
  <circle cx="100" cy="65" r="8" fill="#FFD700"/>
  
  <!-- Staff Symbol -->
  <line x1="100" y1="90" x2="100" y2="150" stroke="#000" stroke-width="4" opacity="0.6"/>
  <circle cx="100" cy="85" r="10" fill="none" stroke="#000" stroke-width="3" opacity="0.6"/>
  
  <!-- Letter C -->
  <text x="100" y="125" font-family="Arial Black, sans-serif" font-size="60" 
        font-weight="bold" fill="#000" text-anchor="middle" dominant-baseline="middle">C</text>
  
  <!-- Legendary Border Effect -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#FFF" stroke-width="2" 
          stroke-dasharray="10,5" opacity="0.5"/>
</svg>
