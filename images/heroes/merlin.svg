<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="merlinBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9B59B6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3498DB;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <circle cx="100" cy="100" r="95" fill="url(#merlinBg)" stroke="#FFF" stroke-width="4"/>
  
  <!-- Wizard Hat -->
  <polygon points="100,50 75,85 125,85" fill="#000" opacity="0.7"/>
  <circle cx="100" cy="50" r="5" fill="#FFD700"/>
  
  <!-- Magic Wand -->
  <line x1="100" y1="90" x2="100" y2="150" stroke="#FFF" stroke-width="3" opacity="0.7"/>
  <polygon points="100,85 96,95 104,95" fill="#FFD700" opacity="0.8"/>
  
  <!-- Letter M -->
  <text x="100" y="130" font-family="Arial Black, sans-serif" font-size="55" 
        font-weight="bold" fill="#FFF" text-anchor="middle" dominant-baseline="middle">M</text>
  
  <!-- Epic Border Effect -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#FFF" stroke-width="2" 
          stroke-dasharray="8,4" opacity="0.5"/>
</svg>
